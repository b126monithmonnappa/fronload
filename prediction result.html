<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prediction Result | TumorVision</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap');

:root {
  --accent: #00f5d4;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
  min-height: 100vh;
  background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
  background-size: 600% 600%;
  animation: bgMove 10s ease infinite;
  color: white;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* glow blobs */
body::before, body::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: var(--accent);
  filter: blur(150px);
  border-radius: 50%;
  opacity: 0.3;
}

body::before { top: -50px; left: -50px; }
body::after { bottom: -50px; right: -50px; }

/* ===== HEADER ===== */
.header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  padding: 30px 40px;
  align-items: center;
}

.header-title {
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(90deg,#00f5d4,#00bbf9);
  -webkit-background-clip: text;
  color: transparent;
}

.header-center {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
}

.header-action a {
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 25px;
  background: linear-gradient(45deg,#00f5d4,#00bbf9);
  color: black;
  transition: 0.3s;
}

.header-action a:hover {
  box-shadow: 0 0 15px #00f5d4;
}

/* ===== RESULT ===== */
.result-container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 20px;
}

/* main card */
.result-summary {
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,255,200,0.2);
  margin-bottom: 40px;
}

/* prediction text */
.result-summary h2 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #00f5d4;
}

.prediction {
  font-size: 24px;
  font-weight: 700;
}

/* confidence bar */
.bar {
  margin-top: 20px;
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.bar-fill {
  width: 85%; /* static value */
  height: 100%;
  background: linear-gradient(90deg,#00f5d4,#00bbf9);
  box-shadow: 0 0 10px #00f5d4;
}

/* ===== IMAGES ===== */
.images-section {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.image-card {
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.image-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(0,255,200,0.3);
}

.image-card img {
  width: 240px;
  border-radius: 10px;
  margin-top: 10px;
}

/* ===== BUTTON ===== */
.report-btn-wrapper {
  text-align: center;
  margin-top: 50px;
}

.report-btn {
  padding: 14px 30px;
  border-radius: 25px;
  border: none;
  font-weight: 600;
  background: linear-gradient(45deg,#00f5d4,#00bbf9);
  cursor: pointer;
  transition: 0.3s;
}

.report-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00f5d4;
}

</style>
</head>

<body>

<div class="header">
  <div class="header-title">TumorVision</div>
  <div class="header-center">Prediction Result</div>
  <div class="header-action">
    <a href="#">Back to Dashboard</a>
  </div>
</div>

<div class="result-container">

  <div class="result-summary">
    <h2>Detection Outcome</h2>
    <div class="prediction">
      Prediction: Tumor Detected
    </div>

    <div class="bar">
      <div class="bar-fill"></div>
    </div>

    <p style="margin-top:10px;">Confidence: 85%</p>
  </div>

  <div class="images-section">

    <div class="image-card">
      <h4>Original MRI</h4>
      <img src="https://via.placeholder.com/240" alt="">
    </div>

    <div class="image-card">
      <h4>AI Heatmap</h4>
      <img src="https://via.placeholder.com/240" alt="">
    </div>

  </div>

</div>

<div class="report-btn-wrapper">
  <button class="report-btn">Generate Diagnostic Report</button>
</div>

</body>
</html>
