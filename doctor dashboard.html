<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TumorVision Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap');

:root {
  --accent: #00f5d4;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* ===== BACKGROUND ===== */
body {
  min-height: 100vh;
  background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
  overflow-x: hidden;
  color: white;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* glowing circles */
body::before, body::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: var(--accent);
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.4;
}

body::before {
  top: -50px;
  left: -50px;
}

body::after {
  bottom: -50px;
  right: -50px;
}

/* ===== HEADER ===== */
.header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  padding: 30px 40px;
  align-items: center;
}

/* gradient title */
.header-title {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(90deg, #00f5d4, #00bbf9);
  -webkit-background-clip: text;
  color: transparent;
}

/* glowing welcome */
.header-welcome {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: #e0f7fa;
  text-shadow: 0 0 10px rgba(0,255,200,0.4);
}

/* logout button */
.header-logout a {
  padding: 10px 20px;
  border-radius: 25px;
  text-decoration: none;
  color: white;
  background: linear-gradient(45deg, #00f5d4, #00bbf9);
  transition: 0.3s;
}

.header-logout a:hover {
  box-shadow: 0 0 15px #00f5d4;
  transform: scale(1.05);
}

/* ===== NAV ===== */
.nav-bar {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 20px;
}

.nav-bar a {
  text-decoration: none;
  color: white;
  font-weight: 500;
  position: relative;
}

.nav-bar a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background: #00f5d4;
  left: 0;
  bottom: -5px;
  transition: 0.3s;
}

.nav-bar a:hover::after {
  width: 100%;
}

/* ===== CONTENT ===== */
.content {
  text-align: center;
  margin: 40px auto;
  max-width: 800px;
}

.content p {
  font-size: 18px;
  color: #d1f7f5;
  line-height: 1.7;
}

/* ===== FORM ===== */
.form-wrapper {
  width: 420px;
  margin: auto;
  padding: 35px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,255,200,0.2);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0% {transform: translateY(0px);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0px);}
}

.form-wrapper h3 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;
  color: #00f5d4;
}

/* inputs */
.form-wrapper select,
.form-wrapper input {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

.form-wrapper select:focus,
.form-wrapper input:focus {
  outline: none;
  box-shadow: 0 0 10px #00f5d4;
}

/* button */
.form-wrapper button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border-radius: 25px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(45deg, #00f5d4, #00bbf9);
  color: black;
  transition: 0.3s;
}

.form-wrapper button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00f5d4;
}

</style>
</head>

<body>

<div class="header">
  <div class="header-title">TumorVision</div>
  <div class="header-welcome">Welcome, User</div>
  <div class="header-logout">
    <a href="#">Logout</a>
  </div>
</div>

<div class="nav-bar">
  <a href="#">Profile</a>
</div>

<div class="content">
  <p>
    Upload your MRI scan and let our AI detect brain tumors with precision.
    Get instant insights and assist medical decisions with advanced deep learning models.
  </p>
</div>

<div class="form-wrapper">
  <h3>Upload MRI Scan</h3>

  <form action="#" method="post" enctype="multipart/form-data">

    <select required>
      <option disabled selected>Select Model</option>
      <option>Xception</option>
      <option>ResNet50</option>
      <option>DenseNet121</option>
      <option>EfficientNet</option>
    </select>

    <input type="file" required>

    <button>Upload & Predict</button>
  </form>
</div>

</body>
</html>
