<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TumorVision</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0f23, #1a1a2e, #16213e);
    overflow: hidden;
    position: relative;
    color: #e0e0e0;
  }

  .background-icons {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
  }

  .icon {
    position: absolute;
    opacity: 0.15;
    animation: float 25s infinite linear;
    font-size: 4rem;
    color: #00d4ff;
    filter: blur(0.5px);
  }

  .icon:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
  .icon:nth-child(2) { top: 20%; left: 80%; animation-delay: 6s; color: #ff6b6b; }
  .icon:nth-child(3) { top: 60%; left: 20%; animation-delay: 12s; color: #4ecdc4; }
  .icon:nth-child(4) { top: 80%; left: 70%; animation-delay: 18s; color: #ffe66d; }
  .icon:nth-child(5) { top: 40%; left: 50%; animation-delay: 9s; color: #a8e6cf; }

  @keyframes float {
    0% { transform: translateY(0) rotate(0deg) scale(1); }
    25% { transform: translateY(-30px) rotate(90deg) scale(1.1); }
    50% { transform: translateY(0) rotate(180deg) scale(0.9); }
    75% { transform: translateY(30px) rotate(270deg) scale(1.05); }
    100% { transform: translateY(0) rotate(360deg) scale(1); }
  }

  .top-bar a {
    display: none;
  }

  .back-home {
    position: absolute;
    top: 22px;
    right: 40px;
    background: linear-gradient(135deg, #00d4ff, #0099cc);
    color: #ffffff;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
    font-size: 14.5px;
    font-weight: 600;
    z-index: 10;
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
    transition: all 0.3s ease;
  }

  .back-home:hover {
    background: linear-gradient(135deg, #0099cc, #0077aa);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
  }

  .auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .auth-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: 100%;
    max-width: 420px;
    padding: 40px 35px;
    border-radius: 20px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3), 0 0 30px rgba(0, 212, 255, 0.2);
    text-align: center;
    animation: slideIn 0.8s ease-out;
  }

  @keyframes slideIn {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .auth-card h1 {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
  }

  .logo {
    font-size: 3rem;
    margin-bottom: 10px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .auth-card .subtitle {
    font-size: 16px;
    color: #b0b0b0;
    margin-bottom: 30px;
  }

  .form-label {
    display: block;
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    color: #e0e0e0;
    margin-bottom: 8px;
  }

  .form-input,
  .form-select {
    width: 100%;
    margin-top: 5px;
    padding: 12px 15px;
    font-size: 15px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    transition: all 0.3s ease;
  }

  .form-input:focus,
  .form-select:focus {
    border-color: #00d4ff;
    box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.3);
    outline: none;
    background: rgba(255, 255, 255, 0.15);
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
    color: #e0e0e0;
    margin-bottom: 15px;
    cursor: pointer;
  }

  .form-checkbox {
    margin-right: 10px;
    width: 18px;
    height: 18px;
    accent-color: #00d4ff;
  }

  .auth-btn {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #00d4ff, #0099cc);
    color: #ffffff;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
  }

  .auth-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, #0099cc, #0077aa);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
  }

  .auth-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .auth-foot {
    margin-top: 20px;
    font-size: 14px;
    color: #b0b0b0;
  }

  .auth-foot a {
    color: #00d4ff;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .auth-foot a:hover {
    color: #66e0ff;
    text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
  }
</style>

<div class="background-icons">
  <div class="icon">🧠</div>
  <div class="icon">❤️</div>
  <div class="icon">🩺</div>
  <div class="icon">🧬</div>
  <div class="icon">💊</div>
</div>

<a href="{{ url_for('home') }}" class="back-home">← Back to Home</a>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="logo">🧠</div>
    <h1>Login</h1>
    <div class="subtitle">Access your TumorVision account</div>

    <form method="POST" id="login-form" novalidate>

      <label class="form-label">
        Username or Email
        <input
          name="username_or_email"
          required
          class="form-input"
          value=""
        />
      </label>

      <label class="form-label">
        Password
        <input
          type="password"
          name="password"
          required
          class="form-input"
        />
      </label>

      <label class="form-label checkbox-label">
        <input type="checkbox" name="remember" class="form-checkbox" />
        Remember me
      </label>

      <button type="submit" class="auth-btn" id="login-submit">
        Login
      </button>

    </form>

    <div class="auth-foot">
      <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
    </div>
    <div class="auth-foot">
      Don’t have an account?
      <a href="{{ url_for('register') }}">Register here</a>
    </div>

  </div>
</div>
<script>
(function () {
  const form = document.getElementById("login-form");
  const usernameInput = form.querySelector("[name='username_or_email']");
  const passwordInput = form.querySelector("[name='password']");

  form.addEventListener("submit", function (e) {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      e.preventDefault();
      alert("Please enter both username/email and password.");
    }
  });
})();
</script>
</body>
</html>
