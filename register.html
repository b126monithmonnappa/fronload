<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | TumorVision</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap');

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body {
  min-height:100vh;
  background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
  background-size:600% 600%;
  animation: bgMove 10s ease infinite;
  color:white;
}

@keyframes bgMove {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== BACKGROUND ICONS ===== */
.bg-icon {
  position:fixed;
  opacity:0.08;
  z-index:-1;
}

.icon1 { top:10%; left:8%; width:70px; }
.icon2 { top:60%; left:80%; width:80px; }
.icon3 { top:30%; left:50%; width:90px; }
.icon4 { top:75%; left:20%; width:70px; }

/* ===== BACK BUTTON ===== */
.back-home {
  position:absolute;
  top:20px;
  right:40px;
  padding:10px 20px;
  border-radius:25px;
  background: linear-gradient(45deg,#00f5d4,#00bbf9);
  color:black;
  text-decoration:none;
  font-weight:600;
}

.back-home:hover {
  box-shadow:0 0 15px #00f5d4;
}

/* ===== CARD ===== */
.auth-wrapper {
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.auth-card {
  width:100%;
  max-width:420px;
  padding:35px;
  border-radius:20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow:0 0 40px rgba(0,255,200,0.2);
  text-align:center;
}

.auth-card h1 {
  font-size:30px;
  margin-bottom:5px;
  background: linear-gradient(90deg,#00f5d4,#00bbf9);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle {
  font-size:15px;
  margin-bottom:20px;
  color:#cdeeee;
}

/* ===== FORM ===== */
.form-label {
  display:block;
  text-align:left;
  margin-top:12px;
  font-size:13px;
}

.form-input, .form-select {
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:10px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:white;
}

.form-input:focus, .form-select:focus {
  outline:none;
  box-shadow:0 0 10px #00f5d4;
}

/* ===== BUTTON ===== */
.auth-btn {
  width:100%;
  margin-top:20px;
  padding:12px;
  border-radius:25px;
  border:none;
  font-weight:600;
  background: linear-gradient(45deg,#00f5d4,#00bbf9);
  cursor:pointer;
}

.auth-btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #00f5d4;
}

/* ===== FOOT ===== */
.auth-foot {
  margin-top:15px;
  font-size:13px;
}

.auth-foot a {
  color:#00f5d4;
  text-decoration:none;
}

.auth-foot a:hover {
  text-decoration:underline;
}
</style>
</head>

<body>

<!-- MEDICAL ICONS BACKGROUND -->
<img src="https://cdn-icons-png.flaticon.com/512/2966/2966481.png" class="bg-icon icon1">
<img src="https://cdn-icons-png.flaticon.com/512/3209/3209265.png" class="bg-icon icon2">
<img src="https://cdn-icons-png.flaticon.com/512/4149/4149678.png" class="bg-icon icon3">
<img src="https://cdn-icons-png.flaticon.com/512/3771/3771417.png" class="bg-icon icon4">

<!-- BACK BUTTON -->
<a href="#" class="back-home">← Home</a>

<div class="auth-wrapper">
  <div class="auth-card">

    <h1>Register</h1>
    <div class="subtitle">Create your TumorVision account</div>

    <form id="register-form">

      <label class="form-label">
        Username
        <input required class="form-input">
      </label>

      <label class="form-label">
        Email
        <input type="email" required class="form-input">
      </label>

      <label class="form-label">
        Password
        <input type="password" required class="form-input">
      </label>

      <label class="form-label">
        Register as Doctor
        <select id="role-select" required class="form-select">
          <option disabled selected>Select Role</option>
          <option value="doctor">Doctor</option>
        </select>
      </label>

      <label class="form-label" id="hospital-row" style="display:none;">
        Hospital Name
        <input type="text" id="hospital-input" class="form-input">
      </label>

      <label class="form-label" id="experience-row" style="display:none;">
        Experience (Years)
        <input type="number" id="experience-input" class="form-input">
      </label>

      <button class="auth-btn">Register</button>
    </form>

    <div class="auth-foot">
      Already have an account?
      <a href="#">Login</a>
    </div>

  </div>
</div>

<script>
const roleSelect = document.getElementById("role-select");
const hospitalRow = document.getElementById("hospital-row");
const experienceRow = document.getElementById("experience-row");

roleSelect.addEventListener("change", function () {
  if (this.value === "doctor") {
    hospitalRow.style.display = "block";
    experienceRow.style.display = "block";
  } else {
    hospitalRow.style.display = "none";
    experienceRow.style.display = "none";
  }
});
</script>

</body>
</html>
